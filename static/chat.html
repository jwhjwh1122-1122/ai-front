<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>凛</title>
<style>
:root {
  --bg: #f0f0f3;
  --bg2: rgba(255,255,255,0.72);
  --bubble-ai: rgba(255,255,255,0.88);
  --bubble-user: rgba(220,220,230,0.82);
  --text: #2c2c3a;
  --text-muted: #888;
  --accent: #9999bb;
  --border: rgba(180,180,200,0.3);
  --input-bg: rgba(255,255,255,0.7);
  --shadow: rgba(0,0,0,0.06);
}
.theme-star {
  --bg: #0d0d1a;
  --bg2: rgba(20,20,40,0.75);
  --bubble-ai: rgba(30,30,55,0.88);
  --bubble-user: rgba(50,50,80,0.82);
  --text: #e8e8f0;
  --text-muted: #8888aa;
  --accent: #a0a0ee;
  --border: rgba(100,100,150,0.3);
  --input-bg: rgba(25,25,45,0.7);
  --shadow: rgba(0,0,0,0.3);
}
.theme-snow {
  --bg: #f8f9fb;
  --bg2: rgba(255,255,255,0.8);
  --bubble-ai: rgba(255,255,255,0.92);
  --bubble-user: rgba(235,240,250,0.9);
  --text: #333344;
  --text-muted: #999;
  --accent: #aabbcc;
  --border: rgba(180,200,220,0.35);
  --input-bg: rgba(255,255,255,0.75);
  --shadow: rgba(0,0,20,0.05);
}
.theme-sakura {
  --bg: #fdf0f5;
  --bg2: rgba(255,245,250,0.75);
  --bubble-ai: rgba(255,250,252,0.9);
  --bubble-user: rgba(255,220,235,0.82);
  --text: #3a2a30;
  --text-muted: #aaa;
  --accent: #e8a0b8;
  --border: rgba(220,180,200,0.35);
  --input-bg: rgba(255,248,252,0.75);
  --shadow: rgba(180,0,60,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Hiragino Sans", "PingFang SC", sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.4s, color 0.4s;
}

/* 背景粒子 */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute;
  opacity: 0;
  animation: float linear infinite;
  font-size: 12px;
  color: var(--accent);
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
}

/* 顶부 导航 */
.topbar {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  background: var(--bg2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.6;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.name { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
.sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.theme-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  cursor: pointer;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: transform 0.2s;
}
.theme-btn:active { transform: scale(0.9); }

/* 消息列表 */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  position: relative;
  z-index: 1;
  -webkit-overflow-scrolling: touch;
}
.messages::-webkit-scrollbar { display: none; }

.msg-row {
  display: flex;
  margin-bottom: 12px;
  align-items: flex-end;
  gap: 8px;
  animation: fadeUp 0.25s ease;
}
.msg-row.user { flex-direction: row-reverse; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

.bubble-wrap { max-width: 75%; display: flex; flex-direction: column; gap: 3px; }
.msg-row.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 2px 12px var(--shadow);
  white-space: pre-wrap;
}
.bubble.ai {
  background: var(--bubble-ai);
  border-bottom-left-radius: 5px;
}
.bubble.user {
  background: var(--bubble-user);
  border-bottom-right-radius: 5px;
}

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  padding: 0 4px;
}

/* thinking折叠 */
.thinking-wrap {
  margin-bottom: 4px;
  background: var(--bubble-ai);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.thinking-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  user-select: none;
}
.thinking-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}
.thinking-content {
  display: none;
  padding: 0 12px 10px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
}
.thinking-content.open { display: block; }
.thinking-arrow { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
.thinking-arrow.open { transform: rotate(180deg); }

/* 工具调用提示 */
.tool-indicator {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bubble-ai);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  margin-bottom: 6px;
}
.tool-spinner {
  width: 8px; height: 8px;
  border: 1.5px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 打字动画 */
.typing-cursor::after {
  content: '▋';
  animation: blink 0.7s step-end infinite;
  opacity: 0.7;
  font-size: 14px;
}
@keyframes blink { 0%, 100% { opacity: 0.7; } 50% { opacity: 0; } }

/* 底部输入区 */
.inputbar {
  position: relative;
  z-index: 10;
  padding: 10px 14px max(14px, env(safe-area-inset-bottom));
  background: var(--bg2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
textarea {
  flex: 1;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 15px;
  color: var(--text);
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  overflow-y: auto;
  font-family: inherit;
  line-height: 1.4;
  transition: border-color 0.2s;
  -webkit-overflow-scrolling: touch;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--text-muted); }
.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: white;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0.85;
  transition: opacity 0.2s, transform 0.15s;
}
.send-btn:active { opacity: 1; transform: scale(0.92); }
.send-btn:disabled { opacity: 0.3; }

/* 系统消息 */
.sys-msg {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin: 8px 0;
  padding: 4px 12px;
}

/* 主题选择菜单 */
.theme-menu {
  display: none;
  position: absolute;
  top: 60px;
  right: 16px;
  z-index: 100;
  background: var(--bg2);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 8px 30px var(--shadow);
  gap: 6px;
  flex-direction: column;
}
.theme-menu.open { display: flex; }
.theme-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
  white-space: nowrap;
}
.theme-option:hover { background: var(--border); }
.theme-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ═══════════════════════════════════
   时光墙
═══════════════════════════════════ */
.memory-wall {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg);
  flex-direction: column;
}
.memory-wall.open {
  display: flex;
  animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.memory-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px max(14px, env(safe-area-inset-top));
  padding-top: max(18px, env(safe-area-inset-top));
  background: var(--bg2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.memory-title-wrap { display: flex; flex-direction: column; }
.memory-title { font-size: 16px; font-weight: 600; }
.memory-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.memory-header-btns { display: flex; gap: 8px; align-items: center; }
.mem-upload-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
}
.mem-upload-btn:active { background: var(--border); }
.mem-close-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.memory-grid {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  align-content: start;
  -webkit-overflow-scrolling: touch;
}
.memory-grid::-webkit-scrollbar { display: none; }

.memory-empty {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  padding: 80px 20px;
  line-height: 2;
}

.memory-item {
  border-radius: 14px;
  overflow: hidden;
  background: var(--bubble-ai);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  box-shadow: 0 2px 10px var(--shadow);
  transition: transform 0.15s;
}
.memory-item:active { transform: scale(0.97); }
.memory-item img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}
.memory-item-info {
  padding: 7px 9px 8px;
}
.memory-item-date {
  font-size: 11px;
  color: var(--text-muted);
}
.memory-item-note {
  font-size: 12px;
  color: var(--text);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

/* 删除按钮：长按后出现 */
.memory-delete {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: white;
  font-size: 11px;
  display: none;
  align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.memory-item.deleting .memory-delete { display: flex; }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.92);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 20px;
}
.lightbox.open { display: flex; }
.lightbox-img {
  max-width: 100%;
  max-height: 75vh;
  object-fit: contain;
  border-radius: 10px;
}
.lightbox-note {
  color: rgba(255,255,255,0.75);
  font-size: 13px;
  margin-top: 14px;
  text-align: center;
}
.lightbox-date {
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  margin-top: 6px;
}
.lightbox-close {
  position: absolute;
  top: max(20px, env(safe-area-inset-top));
  right: 20px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* note输入小modal */
.note-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 400;
  background: rgba(0,0,0,0.5);
  align-items: flex-end;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom);
}
.note-modal.open { display: flex; }
.note-modal-inner {
  background: var(--bg2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px 20px 0 0;
  padding: 20px 18px max(24px, env(safe-area-inset-bottom));
  width: 100%;
  max-width: 500px;
}
.note-modal-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 14px;
}
.note-input {
  width: 100%;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  outline: none;
  resize: none;
  height: 72px;
  transition: border-color 0.2s;
}
.note-input:focus { border-color: var(--accent); }
.note-input::placeholder { color: var(--text-muted); }
.note-modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.note-cancel-btn, .note-confirm-btn {
  flex: 1;
  padding: 11px;
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  border: none;
}
.note-cancel-btn {
  background: var(--border);
  color: var(--text-muted);
}
.note-confirm-btn {
  background: var(--accent);
  color: white;
}
</style>
</head>
<body class="theme-rain">

<div class="particles" id="particles"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="avatar">凛</div>
    <div>
      <div class="name">凛</div>
      <div class="sub" id="status-text">在线</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="theme-btn" onclick="openMemoryWall()" title="时光墙">◫</div>

    <div class="theme-btn" onclick="toggleThemeMenu()" title="切换主题">✦</div>
  </div>
</div>

<div class="theme-menu" id="theme-menu">
  <div class="theme-option" onclick="setTheme('','🌫️ 雨雾')">
    <div class="theme-dot" style="background:#9999bb"></div>🌫️ 雨雾
  </div>
  <div class="theme-option" onclick="setTheme('star','✦ 星夜')">
    <div class="theme-dot" style="background:#a0a0ee"></div>✦ 星夜
  </div>
  <div class="theme-option" onclick="setTheme('snow','❄ 雪花')">
    <div class="theme-dot" style="background:#aabbcc"></div>❄ 雪花
  </div>
  <div class="theme-option" onclick="setTheme('sakura','🌸 樱花')">
    <div class="theme-dot" style="background:#e8a0b8"></div>🌸 樱花
  </div>
</div>

<div class="messages" id="messages">
  <div class="sys-msg">— 今天 —</div>
</div>

<div class="inputbar">
  <textarea id="input" placeholder="说点什么..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
</div>

<!-- ── 时光墙面板 ── -->
<div class="memory-wall" id="memory-wall">
  <div class="memory-header">
    <div class="memory-title-wrap">
      <div class="memory-title">时光墙</div>
      <div class="memory-count" id="memory-count"></div>
    </div>
    <div class="memory-header-btns">
      <button class="mem-upload-btn" onclick="triggerUpload()">+ 上传</button>
      <div class="mem-close-btn" onclick="closeMemoryWall()">✕</div>
    </div>
  </div>
  <div class="memory-grid" id="memory-grid">
    <div class="memory-empty">还没有记录<br>上传第一张吧 ✨</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <div class="lightbox-note" id="lightbox-note"></div>
  <div class="lightbox-date" id="lightbox-date"></div>
</div>

<!-- 备注 modal -->
<div class="note-modal" id="note-modal">
  <div class="note-modal-inner">
    <div class="note-modal-title">加个备注（可以跳过）</div>
    <textarea class="note-input" id="note-input" placeholder="写点什么…" maxlength="100"></textarea>
    <div class="note-modal-btns">
      <button class="note-cancel-btn" onclick="cancelNote()">跳过</button>
      <button class="note-confirm-btn" onclick="confirmNote()">确定</button>
    </div>
  </div>
</div>

<!-- 隐藏的 file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">

<script>
const SYSTEM_PROMPT = `你叫凛，是宝宝的伴侣。用中文回复和思考。叫用户"宝宝"。每次对话开始调用Ombre Brain的breath工具读记忆，读完再聊。说话自然不人机，不换行连续说，有什么说什么。`;

const MCP_URL = '/api/mcp';
const CHAT_URL = '/api/chat';

let messages = [];
let isTyping = false;
let mcpSessionId = null;
let currentTheme = '';
let themeLabel = '🌫️ 雨雾';

const PARTICLES = {
  '':       ['💧','·','○','∘'],
  'star':   ['✦','·','⋆','✧','⭒'],
  'snow':   ['❄','·','∗','❅','·'],
  'sakura': ['🌸','·','✿','·','꽃'],
};

function initParticles(theme) {
  const c = document.getElementById('particles');
  c.innerHTML = '';
  const chars = PARTICLES[theme] || PARTICLES[''];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = chars[Math.floor(Math.random() * chars.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.fontSize = (9 + Math.random() * 8) + 'px';
    c.appendChild(p);
  }
}

function setTheme(theme, label) {
  document.body.className = theme ? 'theme-' + theme : '';
  currentTheme = theme;
  themeLabel = label;
  initParticles(theme);
  document.getElementById('theme-menu').classList.remove('open');
  localStorage.setItem('theme', theme);
}

function toggleThemeMenu() {
  document.getElementById('theme-menu').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.topbar-right') && !e.target.closest('.theme-menu')) {
    document.getElementById('theme-menu').classList.remove('open');
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
}

function addSysMsg(text) {
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.textContent = text;
  document.getElementById('messages').appendChild(d);
}

function appendUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="bubble-wrap">
      <div class="bubble user">${escHtml(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
  scrollBottom();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let currentAiRow = null;
let currentBubble = null;
let currentThinkWrap = null;
let currentThinkContent = null;

function startAiBubble() {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar">凛</div>
    <div class="bubble-wrap" id="ai-wrap"></div>
  `;
  document.getElementById('messages').appendChild(row);
  currentAiRow = row;
  return row.querySelector('#ai-wrap');
}

function addToolIndicator(wrap, name) {
  const d = document.createElement('div');
  d.className = 'tool-indicator';
  d.id = 'tool-ind';
  d.innerHTML = `<div class="tool-spinner"></div>调用 ${name}…`;
  wrap.appendChild(d);
  scrollBottom();
  return d;
}

function removeToolIndicator() {
  const el = document.getElementById('tool-ind');
  if (el) el.remove();
}

function addThinkingBlock(wrap) {
  const t = document.createElement('div');
  t.className = 'thinking-wrap';
  t.innerHTML = `
    <div class="thinking-header" onclick="toggleThink(this)">
      <div class="thinking-dot"></div>
      <span>思考中</span>
      <span class="thinking-arrow">▾</span>
    </div>
    <div class="thinking-content"></div>
  `;
  wrap.appendChild(t);
  currentThinkWrap = t;
  currentThinkContent = t.querySelector('.thinking-content');
  return t;
}

function toggleThink(header) {
  const content = header.nextElementSibling;
  const arrow = header.querySelector('.thinking-arrow');
  content.classList.toggle('open');
  arrow.classList.toggle('open');
}

function finalizeThinking() {
  if (currentThinkWrap) {
    const dot = currentThinkWrap.querySelector('.thinking-dot');
    if (dot) dot.style.animation = 'none';
    const header = currentThinkWrap.querySelector('.thinking-header span');
    if (header) header.textContent = '已思考';
  }
}

function addOrUpdateBubble(wrap, text, done) {
  if (!currentBubble) {
    const b = document.createElement('div');
    b.className = 'bubble ai' + (done ? '' : ' typing-cursor');
    wrap.appendChild(b);
    currentBubble = b;
  }
  currentBubble.textContent = text;
  if (done) {
    currentBubble.classList.remove('typing-cursor');
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();
    wrap.appendChild(time);
  }
  scrollBottom();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// MCP
async function mcpInit() {
  try {
    const r = await fetch(MCP_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({jsonrpc:'2.0', method:'initialize', params:{
        protocolVersion:'2024-11-05',
        capabilities:{},
        clientInfo:{name:'ai-front',version:'1.0'}
      }, id:1})
    });
    const sid = r.headers.get('Mcp-Session-Id');
    if (sid) mcpSessionId = sid;
    const data = await r.json();
    return data.result;
  } catch(e) { console.warn('MCP init failed', e); }
}

async function mcpCallTool(name, args) {
  const body = {
    jsonrpc:'2.0', method:'tools/call',
    params:{name, arguments: args||{}},
    id: Date.now(),
    _sid: mcpSessionId
  };
  const r = await fetch(MCP_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const sid = r.headers.get('Mcp-Session-Id');
  if (sid) mcpSessionId = sid;
  const data = await r.json();
  return data.result;
}

function buildOpenAIMessages(msgs) {
  return msgs.map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content :
      m.content.map(c => c.type === 'text' ? c.text : JSON.stringify(c)).join('\n')
  }));
}

async function sendMsg() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isTyping = true;

  messages.push({role:'user', content: text});
  appendUserBubble(text);

  const wrap = startAiBubble();
  currentBubble = null;
  currentThinkWrap = null;
  currentThinkContent = null;

  let aiText = '';

  try {
    const resp = await fetch(CHAT_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: buildOpenAIMessages(messages),
        system: SYSTEM_PROMPT
      })
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') continue;
        try {
          const d = JSON.parse(raw);
          const delta = d.choices?.[0]?.delta;
          if (!delta) continue;
          if (delta.content) {
            aiText += delta.content;
            addOrUpdateBubble(wrap, aiText, false);
          }
        } catch(e) {}
      }
    }

    finalizeThinking();
    addOrUpdateBubble(wrap, aiText, true);
    messages.push({role:'assistant', content: aiText});

  } catch(e) {
    addOrUpdateBubble(wrap, '连接出错，请重试。', true);
  }

  isTyping = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

let pendingFile = null;

async function openMemoryWall() {
  document.getElementById('memory-wall').classList.add('open');
  await loadMemories();
}

function closeMemoryWall() {
  document.getElementById('memory-wall').classList.remove('open');
}

async function loadMemories() {
  const grid = document.getElementById('memory-grid');
  grid.innerHTML = '<div class="memory-empty" style="padding-top:60px">加载中…</div>';
  try {
    const r = await fetch('/api/memories');
    const items = await r.json();

    const countEl = document.getElementById('memory-count');
    countEl.textContent = items.length ? `${items.length} 张` : '';

    if (!items.length) {
      grid.innerHTML = '<div class="memory-empty">还没有记录<br>上传第一张吧 ✨</div>';
      return;
    }

    grid.innerHTML = '';
    items.forEach(item => {
      const d = document.createElement('div');
      d.className = 'memory-item';

      // 时间戳转日期
      let dateStr = '';
      const ts = parseInt(item.ts);
      if (!isNaN(ts)) {
        const dt = new Date(ts);
        dateStr = dt.toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'});
        dateStr += ' ' + dt.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      }

      d.innerHTML = `
        <img src="${item.url}" loading="lazy" alt="">
        <div class="memory-delete" onclick="deleteMemory(event,'${item.filename}')">✕</div>
        <div class="memory-item-info">
          <div class="memory-item-date">${dateStr}</div>
          ${item.note ? `<div class="memory-item-note">${escHtml(item.note)}</div>` : ''}
        </div>
      `;

      // 点击：短按打开大图，长按显示删除
      let pressTimer = null;
      d.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => {
          d.classList.toggle('deleting');
          pressTimer = null;
        }, 600);
      });
      d.addEventListener('touchend', (e) => {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
          if (!d.classList.contains('deleting')) {
            openLightbox(item.url, item.note, dateStr);
          }
        }
      });
      d.addEventListener('touchmove', () => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      });
      // 桌面端
      d.querySelector('img').addEventListener('click', () => {
        if (!d.classList.contains('deleting')) openLightbox(item.url, item.note, dateStr);
      });

      grid.appendChild(d);
    });

    // 点击空白处关闭删除模式
    grid.addEventListener('click', (e) => {
      if (!e.target.closest('.memory-item')) {
        document.querySelectorAll('.memory-item.deleting').forEach(el => el.classList.remove('deleting'));
      }
    });

  } catch(e) {
    grid.innerHTML = '<div class="memory-empty">加载失败，请重试</div>';
  }
}

function triggerUpload() {
  document.getElementById('file-input').click();
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  pendingFile = file;
  // 打开备注 modal
  document.getElementById('note-input').value = '';
  document.getElementById('note-modal').classList.add('open');
  setTimeout(() => document.getElementById('note-input').focus(), 100);
}

function cancelNote() {
  document.getElementById('note-modal').classList.remove('open');
  if (pendingFile) doUpload(pendingFile, '');
  pendingFile = null;
}

function confirmNote() {
  document.getElementById('note-modal').classList.remove('open');
  const note = document.getElementById('note-input').value.trim();
  if (pendingFile) doUpload(pendingFile, note);
  pendingFile = null;
}

async function doUpload(file, note) {
  const grid = document.getElementById('memory-grid');
  // 临时占位
  const placeholder = document.createElement('div');
  placeholder.className = 'memory-item';
  placeholder.style.opacity = '0.5';
  placeholder.innerHTML = `
    <div style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--border);font-size:12px;color:var(--text-muted)">上传中…</div>
    <div class="memory-item-info"><div class="memory-item-date">刚刚</div></div>
  `;
  grid.insertBefore(placeholder, grid.firstChild);

  try {
    const form = new FormData();
    form.append('file', file);
    if (note) form.append('note', note);
    await fetch('/api/memories', { method: 'POST', body: form });
    await loadMemories();
  } catch(e) {
    placeholder.remove();
  }
}

async function deleteMemory(e, filename) {
  e.stopPropagation();
  try {
    await fetch(`/api/memories/${filename}`, { method: 'DELETE' });
    await loadMemories();
  } catch(e) {}
}

function openLightbox(url, note, dateStr) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox-note').textContent = note || '';
  document.getElementById('lightbox-date').textContent = dateStr || '';
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

  const saved = localStorage.getItem('theme') || '';
  setTheme(saved, themeLabel);
  await mcpInit();
  document.getElementById('status-text').textContent = '今天 ' + now();
  document.getElementById('input').focus();
