<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; word-wrap: break-word; line-height: 1.5; }
        .user { align-self: flex-end; background: #0a84ff; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #2c2c2c; border-bottom-left-radius: 4px; }
        .thinking { color: #888; font-size: 0.85em; margin: 4px 0; padding-left: 12px; border-left: 2px solid #444; }
        #input-area { display: flex; padding: 12px; background: #2a2a2a; border-top: 1px solid #333; gap: 8px; }
        #input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #3a3a3a; color: white; font-size: 16px; outline: none; }
        #send { background: #0a84ff; border: none; color: white; padding: 10px 20px; border-radius: 20px; font-size: 16px; cursor: pointer; }
        #send:disabled { opacity: 0.5; }
        .loading { align-self: center; color: #888; font-size: 14px; margin: 8px 0; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="输入消息..." />
        <button id="send">发送</button>
    </div>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        // ---------- 获取当前北京时间（格式：2026.07.10 09:20）----------
        function getBeijingTime() {
            const now = new Date();
            const utc = now.getTime() + now.getTimezoneOffset() * 60000;
            const beijing = new Date(utc + 8 * 3600000);
            const year = beijing.getFullYear();
            const month = String(beijing.getMonth() + 1).padStart(2, '0');
            const day = String(beijing.getDate()).padStart(2, '0');
            const hours = String(beijing.getHours()).padStart(2, '0');
            const minutes = String(beijing.getMinutes()).padStart(2, '0');
            return `${year}.${month}.${day} ${hours}:${minutes}`;
        }

        // 发送消息时自动注入当前时间
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            const timeStr = getBeijingTime();
            // 消息前缀格式：[2026.07.10 09:20]
            const fullMsg = `[${timeStr}]\n${text}`;
            appendMessage('user', fullMsg);
            input.value = '';
            sendBtn.disabled = true;
            appendMessage('ai', '思考中...', true);

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: fullMsg }],
                    system: '你是AI助手，请依据用户提供的时间信息回答问题。'
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let aiFull = '';
                let thinkingContent = '';
                let isThinking = false;
                const aiMsgDiv = chatDiv.querySelector('.ai:last-child');

                function readStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            if (aiMsgDiv && aiMsgDiv.textContent === '思考中...') {
                                aiMsgDiv.textContent = '（无响应）';
                            }
                            sendBtn.disabled = false;
                            return;
                        }
                        const chunk = decoder.decode(value, { stream: true });
                        buffer += chunk;
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const jsonStr = line.slice(6).trim();
                                if (jsonStr === '[DONE]') continue;
                                try {
                                    const data = JSON.parse(jsonStr);
                                    const delta = data.choices?.[0]?.delta;
                                    if (delta?.content) {
                                        aiFull += delta.content;
                                        if (aiMsgDiv) {
                                            aiMsgDiv.textContent = aiFull;
                                            aiMsgDiv.classList.remove('loading');
                                            chatDiv.scrollTop = chatDiv.scrollHeight;
                                        }
                                    }
                                    if (delta?.reasoning_content) {
                                        thinkingContent += delta.reasoning_content;
                                        let thinkingDiv = aiMsgDiv?.parentElement?.querySelector('.thinking');
                                        if (!thinkingDiv && aiMsgDiv) {
                                            thinkingDiv = document.createElement('div');
                                            thinkingDiv.className = 'thinking';
                                            aiMsgDiv.parentElement.insertBefore(thinkingDiv, aiMsgDiv);
                                        }
                                        if (thinkingDiv) thinkingDiv.textContent = '💭 ' + thinkingContent;
                                    }
                                } catch (e) { /* 忽略解析错误 */ }
                            }
                        }
                        readStream();
                    });
                }
                readStream();
            })
            .catch(err => {
                appendMessage('ai', '错误：' + err.message);
                sendBtn.disabled = false;
            });
        }

        function appendMessage(role, content, isLoading = false) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            if (isLoading) div.classList.add('loading');
            div.textContent = content;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 初始欢迎
        appendMessage('ai', '你好！我是AI助手。每次发送消息时，我会自动获取当前北京时间（格式：2026.07.10 09:20）。');
    </script>
</body>
</html>
